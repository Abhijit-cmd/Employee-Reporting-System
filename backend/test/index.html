<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ConstroMat Auth</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      height:100vh;
      display:flex;
    }

    .left{
      width:50%;
      background:linear-gradient(to bottom right,#d62828,#ff5e62);
      color:white;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:80px;
    }

    .left h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .left p{
      font-size:22px;
      line-height:1.5;
    }

    .right{
      width:50%;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .box{
      width:450px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h2{
      text-align:center;
      margin-bottom:10px;
      font-size:35px;
    }

    .sub{
      text-align:center;
      margin-bottom:30px;
      color:#555;
    }

    input{
      width:100%;
      padding:15px;
      margin-bottom:20px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button{
      width:100%;
      padding:16px;
      border:none;
      border-radius:50px;
      background:linear-gradient(to right,#d62828,#ff5e62);
      color:white;
      font-size:20px;
      cursor:pointer;
    }

    .bottom{
      text-align:center;
      margin-top:20px;
    }

    .bottom span{
      color:blue;
      cursor:pointer;
      font-weight:bold;
    }

    #registerSection{
      display:none;
    }

  </style>

</head>

<body>

  <!-- LEFT -->

  <div class="left">

    <h1>ConstroMat</h1>

    <p>
      India's trusted marketplace for
      construction suppliers & customers.
    </p>

  </div>


  <!-- RIGHT -->

  <div class="right">

    <div class="box">


      <!-- LOGIN -->

      <div id="loginSection">

        <h2>Login</h2>

        <p class="sub">Login to continue</p>

        <form id="loginForm">

          <input 
            type="email"
            id="loginEmail"
            placeholder="Email"
            required
          >

          <input 
            type="password"
            id="loginPassword"
            placeholder="Password"
            required
          >

          <button type="submit">
            Login
          </button>

        </form>

        <div class="bottom">

          Don't have an account?

          <span onclick="showRegister()">
            Create New One
          </span>

        </div>

      </div>



      <!-- REGISTER -->

      <div id="registerSection">

        <h2>Register</h2>

        <p class="sub">Create your account</p>

        <form id="registerForm">

          <input 
            type="text"
            id="employeeId"
            placeholder="Employee ID"
          >

          <input 
            type="text"
            id="name"
            placeholder="Full Name"
          >

          <input 
            type="email"
            id="email"
            placeholder="Email"
          >

          <input 
            type="password"
            id="password"
            placeholder="Password"
          >

          <input 
            type="text"
            id="phone"
            placeholder="Phone"
          >

          <input 
            type="text"
            id="role"
            placeholder="Role"
          >

          <button type="submit">
            Register
          </button>

        </form>

        <div class="bottom">

          Already have an account?

          <span onclick="showLogin()">
            Login
          </span>

        </div>

      </div>

    </div>

  </div>


  <script>

    // SHOW REGISTER

    function showRegister(){

      document.getElementById("loginSection").style.display = "none";

      document.getElementById("registerSection").style.display = "block";

    }

    // SHOW LOGIN

    function showLogin(){

      document.getElementById("registerSection").style.display = "none";

      document.getElementById("loginSection").style.display = "block";

    }



    // LOGIN API

 // LOGIN API

document.getElementById("loginForm")
.addEventListener("submit", async (e)=>{

  e.preventDefault();

  const loginData = {

    email:
    document.getElementById("loginEmail").value,

    password:
    document.getElementById("loginPassword").value

  };

  try{

    const response = await fetch(
      "http://localhost:5000/api/auth/login",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify(loginData)
      }
    );

    const data = await response.json();


    // LOGIN SUCCESS

    if(response.ok){

      // SAVE TOKEN

      localStorage.setItem(
        "token",
        data.token
      );

      // SAVE USER

      localStorage.setItem(
        "user",
        JSON.stringify(data.user)
      );

      alert("Login successful");

      // REDIRECT

      window.location.href =
      "employee-dashboard.html";

    }else{

      alert(data.message);

    }

  }catch(error){

    console.log(error);

  }

});


    // REGISTER API

    document.getElementById("registerForm")
    .addEventListener("submit", async (e)=>{

      e.preventDefault();

      const userData = {

        employeeId:
        document.getElementById("employeeId").value,

        name:
        document.getElementById("name").value,

        email:
        document.getElementById("email").value,

        password:
        document.getElementById("password").value,

        phone:
        document.getElementById("phone").value,

        role:
        document.getElementById("role").value

      };

      const response = await fetch(
        "http://localhost:5000/api/auth/register",
        {
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify(userData)
        }
      );

      const data = await response.json();

      alert(data.message);

      console.log(data);

    });

  </script>

</body>
</html>
