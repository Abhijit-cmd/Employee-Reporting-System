<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Employee Dashboard</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial;
    }

    body{
      display:flex;
      background:#f5f5f5;
    }

    /* SIDEBAR */

    .sidebar{

      width:250px;

      height:100vh;

      background:#7b1e1e;

      color:white;

      padding:30px 20px;

      position:fixed;

    }

    .sidebar h2{

      margin-bottom:40px;

      text-align:center;

    }

    .sidebar ul{

      list-style:none;

    }

    .sidebar ul li{

      padding:15px;

      margin-bottom:15px;

      background:rgba(255,255,255,0.1);

      border-radius:10px;

      cursor:pointer;

    }

    .sidebar ul li:hover{

      background:#d62828;

    }

    /* MAIN */

    .main{

      margin-left:250px;

      width:100%;

      padding:30px;

    }

    .top{

      display:flex;

      justify-content:space-between;

      align-items:center;

      margin-bottom:30px;

    }

    .top h1{

      color:#7b1e1e;

    }

    .download-btn{

      padding:12px 20px;

      border:none;

      background:#d62828;

      color:white;

      border-radius:10px;

      cursor:pointer;

    }

    /* PREVIEW BOXES */

    .preview-grid{

      display:grid;

      grid-template-columns:repeat(2,1fr);

      gap:20px;

      margin-bottom:40px;

    }

    .box{

      background:white;

      padding:20px;

      border-radius:15px;

      box-shadow:0 5px 15px rgba(0,0,0,0.1);

      min-height:180px;

    }

    .box h3{

      margin-bottom:15px;

      color:#7b1e1e;

    }

    /* FORM */

    .form-section{

      background:white;

      padding:30px;

      border-radius:20px;

      box-shadow:0 5px 15px rgba(0,0,0,0.1);

    }

    .form-section h2{

      margin-bottom:25px;

      color:#7b1e1e;

    }

    textarea,input{

      width:100%;

      padding:15px;

      margin-bottom:20px;

      border-radius:10px;

      border:1px solid #ccc;

      font-size:15px;

    }

    textarea{

      resize:none;

      height:120px;

    }

    .submit-btn{

      width:100%;

      padding:16px;

      border:none;

      background:#d62828;

      color:white;

      font-size:18px;

      border-radius:10px;

      cursor:pointer;

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">

    <h2>ConstroMat</h2>

    <ul>

      <li>🏠 Home</li>

      <li>📝 Create Report</li>

      <li onclick="logout()">🚪 Logout</li>

    </ul>

  </div>


  <!-- MAIN -->

  <div class="main">

    <div class="top">

      <h1>Employee Report Dashboard</h1>

      <button class="download-btn">
        Download PDF
      </button>

    </div>


    <!-- PREVIEW -->

    <div class="preview-grid">

      <div class="box">

        <h3>Business Metrics</h3>

        <p id="previewMetrics"></p>

      </div>

      <div class="box">

        <h3>Challenges</h3>

        <p id="previewChallenges"></p>

      </div>

      <div class="box">

        <h3>Achievements</h3>

        <p id="previewAchievements"></p>

      </div>

      <div class="box">

        <h3>Top Accomplishments</h3>

        <p id="previewAccomplishments"></p>

      </div>

    </div>



    <!-- FORM -->

    <div class="form-section">

      <h2>Create Monthly Report</h2>

      <form id="reportForm">

        <input 
          type="text"
          id="reportMonth"
          placeholder="Report Month"
        >

        <input 
          type="number"
          id="customersRegistered"
          placeholder="Customers Registered"
        >

        <input 
          type="number"
          id="suppliersRegistered"
          placeholder="Suppliers Registered"
        >

        <textarea
          id="businessMetrics"
          placeholder="Business Metrics"
        ></textarea>

        <textarea
          id="challenges"
          placeholder="Challenges"
        ></textarea>

        <textarea
          id="achievements"
          placeholder="Achievements"
        ></textarea>

        <textarea
          id="accomplishments"
          placeholder="Top Accomplishments"
        ></textarea>
        <input 
  type="number"
  id="newBrandProducts"
  placeholder="New Brand Products"
>

<input 
  type="number"
  id="successStories"
  placeholder="Success Stories"
>

<input 
  type="number"
  id="websiteVisitors"
  placeholder="Website Visitors"
>

<textarea
  id="supplierChallenges"
  placeholder="Supplier Challenges"
></textarea>

<textarea
  id="logisticsChallenges"
  placeholder="Logistics Challenges"
></textarea>

<textarea
  id="financeChallenges"
  placeholder="Finance Challenges"
></textarea>

        <button class="submit-btn" type="submit">
          Submit Report
        </button>

      </form>

    </div>

  </div>



  <script>

    // LIVE PREVIEW

    document.getElementById("businessMetrics")
    .addEventListener("input",(e)=>{

      document.getElementById("previewMetrics")
      .innerText = e.target.value;

    });


    document.getElementById("challenges")
    .addEventListener("input",(e)=>{

      document.getElementById("previewChallenges")
      .innerText = e.target.value;

    });


    document.getElementById("achievements")
    .addEventListener("input",(e)=>{

      document.getElementById("previewAchievements")
      .innerText = e.target.value;

    });


    document.getElementById("accomplishments")
    .addEventListener("input",(e)=>{

      document.getElementById("previewAccomplishments")
      .innerText = e.target.value;

    });



    // SUBMIT REPORT

    document.getElementById("reportForm")
    .addEventListener("submit", async(e)=>{

      e.preventDefault();

      const user = JSON.parse(localStorage.getItem("user"));

      const reportData = {

        userId:user.id,

        reportMonth:
        document.getElementById("reportMonth").value,

        reportYear:"2026-01-01",

        customersRegistered:
        document.getElementById("customersRegistered").value,

        suppliersRegistered:
        document.getElementById("suppliersRegistered").value,

        businessMetrics:
        document.getElementById("businessMetrics").value,

        customerChallenges:
        document.getElementById("challenges").value,

        individualMetrics:
        document.getElementById("achievements").value,

        topAccomplishments:
        document.getElementById("accomplishments").value

      };

      const response = await fetch(
        "http://localhost:5000/api/reports/create",
        {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify(reportData)

        }
      );

      const data = await response.json();

      alert(data.message);

      console.log(data);

    });


    // LOGOUT

    function logout(){

      localStorage.clear();

      window.location.href = "index.html";

    }

  </script>

</body>

</html>
